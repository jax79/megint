<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan B - HTML5 Téglalap Szerkesztő</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        #canvas {
            width: 100%;
            flex-grow: 1;
            border: 1px solid black;
            position: relative;
            overflow: hidden;
            background-image:
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 10px 10px;
        }
        #viewport {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform-origin: 0 0;
        }
        .rectangle {
            position: absolute;
            background-color: rgba(200, 200, 200, 0.6);
            border: 1px solid black;
            cursor: pointer;
        }
        .selected {
            box-shadow: 0 0 10px 3px gold;
        }
        .controls {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            width: 100%;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        .controls label {
            display: inline-block;
            width: 80px;
            margin-bottom: 5px;
        }
        .controls input[type="text"] {
            width: 80px;
            margin-bottom: 5px;
        }
        .controls button {
            margin-top: 5px;
            padding: 5px 10px;
        }
        .anchor-controls-container {
            display: flex;
            align-items: center;
        }
        .anchor-grid {
            display: grid;
            grid-template-columns: repeat(3, 20px);
            grid-template-rows: repeat(3, 20px);
            gap: 2px;
        }
        .anchor-grid input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 100%;
            height: 100%;
            margin: 0;
            border: 1px solid #aaa;
            border-radius: 3px;
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anchor-grid input[type="radio"]:checked {
            background-color: #666;
            border-color: #333;
        }
        .anchor-grid input[type="radio"]:hover {
            border-color: #777;
        }
        .group-boundary {
            background-color: rgba(0,0,0,0.0) !important;
        }
        #anchor-viz {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: magenta;
            border-radius: 50%;
            pointer-events: none;
            z-index: 10000;
            display: none;
            transform: translate(-50%, -50%);
            border: 1px solid white;
        }
        .mode-active {
            background-color: #ddd;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="controls">
        <div style="display: flex; flex-wrap: wrap; gap: 10px; align-items: center;">
            <div>
                <label for="rect-x">X:</label>
                <input type="text" id="rect-x">
            </div>
            <div>
                <label for="rect-y">Y:</label>
                <input type="text" id="rect-y">
            </div>
            <div>
                <label for="rect-width">Szélesség:</label>
                <input type="text" id="rect-width">
            </div>
            <div>
                <label for="rect-height">Magasság:</label>
                <input type="text" id="rect-height">
            </div>
        </div>

        <div style="margin-top: 5px;">
            <button id="add-rect-btn">+</button>
            <button id="delete-rect-btn" style="display: none; margin-left: 10px;">Kijelölt törlése</button>
            <button id="duplicate-rect-btn" style="display: none; margin-left: 5px;">Másolás</button>
            <button id="group-btn" style="display: none; margin-left: 5px;">Group</button>
            <button id="ungroup-btn" style="display: none; margin-left: 5px;">Ungroup</button>
            <button id="rotate-cw-btn" style="display: none; margin-left: 5px;">↻</button>
            <button id="rotate-ccw-btn" style="display: none; margin-left: 5px;">↺</button>
            <button id="save-btn" style="margin-left: 20px;">Mentés</button>
            <button id="load-btn">Betöltés</button>
            <button id="export-svg-btn">SVG Export</button>
            <button id="reset-btn">Alaphelyzet</button>
        </div>

        <div style="display: inline-flex; align-items: center; margin-top: 10px; vertical-align: middle; gap: 5px;">
            <button id="select-mode-btn" class="mode-active">Kijelölés</button>
            <button id="pan-mode-btn">Drag</button>
            <button id="fit-btn" style="margin-left: 10px;">Fit</button>
            <button id="reset-zoom-btn">Zoom Reset</button>

            <div class="anchor-controls-container" style="padding: 5px; border: 1px solid #ddd; margin-left: 10px; margin-right: 10px;">
                <span style="margin-right: 5px; font-size: 0.9em;">Megfogási pont:</span>
                <div class="anchor-grid">
                    <input type="radio" name="anchor-point" id="anchor-tl" value="top-left">
                    <input type="radio" name="anchor-point" id="anchor-tc" value="top-center">
                    <input type="radio" name="anchor-point" id="anchor-tr" value="top-right">
                    <input type="radio" name="anchor-point" id="anchor-ml" value="middle-left">
                    <input type="radio" name="anchor-point" id="anchor-mc" value="middle-center" checked>
                    <input type="radio" name="anchor-point" id="anchor-mr" value="middle-right">
                    <input type="radio" name="anchor-point" id="anchor-bl" value="bottom-left">
                    <input type="radio" name="anchor-point" id="anchor-bc" value="bottom-center">
                    <input type="radio" name="anchor-point" id="anchor-br" value="bottom-right">
                </div>
            </div>

            <span>Zoom:
                <input type="text" id="zoom-input" style="width: 50px;" value="100%">
                <select id="zoom-level-select" style="width: 20px; margin-left: -22px; vertical-align: middle;"></select>
            </span>
        </div>
    </div>

    <div id="canvas">
        <div id="viewport">
            <!-- Ide kerülnek a téglalapok -->
            <div id="anchor-viz"></div>
        </div>
    </div>

    <script src="canvasObjects.js"></script>
    <script src="planb.js"></script>
</body>
</html>
