<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plan B - HTML5 Téglalap Szerkesztő</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden; /* Body-n is, hogy ne legyen scrollbar */
            display: flex;
            flex-direction: column;
        }
        #canvas {
            /* width: 800px; */ /* Eltávolítva vagy kommentelve */
            /* height: 600px; */ /* Eltávolítva vagy kommentelve */
            width: 100%; /* Szélesség 100% */
            flex-grow: 1; /* Kitölti a maradék magasságot */
            border: 1px solid black;
            position: relative;
            overflow: hidden; /* Hogy a téglalapok ne lógjanak ki */
            /* transform-origin: 0 0; */ /* Eltávolítva */
            /* transition: transform 0.1s ease-out; */ /* Eltávolítva */
            /* margin-top: 10px; */ /* Flexbox miatt már nem feltétlenül szükséges, vagy másképp kezelendő */
            background-image:
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 10px 10px;
        }
        .rectangle {
            position: absolute;
            background-color: rgba(200, 200, 200, 0.6); /* Alpha növelve 0.6-re */
            border: 1px solid black; /* Visszaállítva fix 1px-re */
            cursor: pointer;
            /* z-index a JS-ből jön majd, de az alapértelmezett itt nem árt, bár felülíródik */
        }
        .selected {
            box-shadow: 0 0 10px 3px gold;
        }
        .controls {
            /* margin-top: 10px; */ /* Flexbox miatt már nem feltétlenül szükséges */
            padding: 10px;
            border-bottom: 1px solid #ccc; /* Alulra egy elválasztó vonal */
            width: 100%; /* Kitölti a rendelkezésre álló szélességet */
            box-sizing: border-box; /* Hogy a padding ne adjon hozzá a szélességhez */
            flex-shrink: 0; /* Hogy ne zsugorodjon */
        }
        .controls label {
            display: inline-block;
            width: 80px;
            margin-bottom: 5px;
        }
        .controls input[type="number"] {
            width: 60px;
            margin-bottom: 5px;
        }
        .controls button {
            margin-top: 10px;
            padding: 5px 10px;
        }
        .anchor-controls-container {
            display: flex; /* Elemek egy sorba rendezése */
            align-items: center; /* Vertikális középre igazítás */
        }
        .anchor-grid {
            display: grid;
            grid-template-columns: repeat(3, 20px); /* 3 oszlop, mind 20px széles */
            grid-template-rows: repeat(3, 20px);    /* 3 sor, mind 20px magas */
            gap: 2px; /* Kis rés a gombok között */
        }
        .anchor-grid input[type="radio"] {
            appearance: none; /* Böngésző alapértelmezett stílusának eltávolítása */
            -webkit-appearance: none;
            -moz-appearance: none;
            width: 100%;
            height: 100%;
            margin: 0;
            border: 1px solid #aaa;
            border-radius: 3px; /* Lekerekített sarkok */
            outline: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .anchor-grid input[type="radio"]:checked {
            background-color: #666;
            border-color: #333;
        }
        .anchor-grid input[type="radio"]:hover {
            border-color: #777;
        }
        .group-boundary {
            background-color: rgba(0,0,0,0.0) !important; /* Ensure transparent background */
            /* border: 1px dashed #888; */ /* Default border, JS can override or set to transparent if only glow needed */
            /* pointer-events: none; */ /* If clicks should pass through to members. For selection, this should be auto or initial. */
        }
    </style>
</head>
<body>

    <div class="controls">
        <div>
            <label for="rect-x">X:</label>
            <input type="number" id="rect-x">
        </div>
        <div>
            <label for="rect-y">Y:</label>
            <input type="number" id="rect-y">
        </div>
        <div>
            <label for="rect-width">Szélesség:</label>
            <input type="number" id="rect-width">
        </div>
        <div>
            <label for="rect-height">Magasság:</label>
            <input type="number" id="rect-height">
        </div>
        <button id="add-rect-btn">+</button>
        <button id="delete-rect-btn" style="display: none; margin-left: 10px;">Kijelölt törlése</button>
        <button id="duplicate-rect-btn" style="display: none; margin-left: 5px;">Másolás</button>
        <button id="group-btn" style="display: none; margin-left: 5px;">Group</button>
        <button id="ungroup-btn" style="display: none; margin-left: 5px;">Ungroup</button>
        <button id="rotate-cw-btn" style="display: none; margin-left: 5px;">↻</button>
        <button id="rotate-ccw-btn" style="display: none; margin-left: 5px;">↺</button>
        <button id="save-btn" style="margin-left: 20px;">Mentés</button>
        <button id="load-btn">Betöltés</button>
        <button id="reset-btn">Alaphelyzet</button>
        
        <div style="display: inline-flex; align-items: baseline; margin-top: 10px; vertical-align: middle;">
            <button id="reset-zoom-btn" style="margin-left: 10px;">Zoom Reset</button>
            
            <div class="anchor-controls-container" style="padding: 5px; border: 1px solid #ddd; margin-left: 10px; margin-right: 10px;">
                <span style="margin-right: 5px; font-size: 0.9em;">Megfogási pont:</span>
                <div class="anchor-grid">
                    <input type="radio" name="anchor-point" id="anchor-tl" value="top-left">
                    <input type="radio" name="anchor-point" id="anchor-tc" value="top-center">
                    <input type="radio" name="anchor-point" id="anchor-tr" value="top-right">
                    <input type="radio" name="anchor-point" id="anchor-ml" value="middle-left">
                    <input type="radio" name="anchor-point" id="anchor-mc" value="middle-center" checked>
                    <input type="radio" name="anchor-point" id="anchor-mr" value="middle-right">
                    <input type="radio" name="anchor-point" id="anchor-bl" value="bottom-left">
                    <input type="radio" name="anchor-point" id="anchor-bc" value="bottom-center">
                    <input type="radio" name="anchor-point" id="anchor-br" value="bottom-right">
                </div>
            </div>
            <span style="/* margin-left: 10px; was here, now handled by anchor-controls right margin */">Zoom: <select id="zoom-level-select"></select></span>
        </div>

        <!-- The rest of the radio buttons that were previously inside the original anchor-controls-container are now correctly placed. -->
    </div>

    <div id="canvas">
        <!-- Ide kerülnek a téglalapok -->
    </div>

    <script src="canvasObjects.js"></script>
    <script src="planb.js"></script>
</body>
</html>
